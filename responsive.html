<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- CSS file -->
    <link rel="stylesheet" href="responsive.css">
    <title>Form</title>
</head>

<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-dark p-2">
        <!-- side menu -->
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <nav class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 text-start">
                    <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#services">Services</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="d-grid place-items-center flex-grow-1 p-3">
        <form class="d-grid gap-3 border p-4 rounded shadow bg-white" id="accountForm">
            <h1 class="text-center mb-4">create a new account</h1>
            <div class="mb-4 d-flex gap-3 flex-column">
                <label for="text" class="form-label fw-semibold text-secondary">First Name</label>
                <input type="text" class="form-control" placeholder="first name">
            </div>

            <div class="mb-4 d-flex gap-3 flex-column">
                <label for="text" class="form-label fw-semibold text-secondary">Last Name</label>
                <input type="text" class="form-control" placeholder="last name">
            </div>

            <div class="mb-4 d-flex gap-3 flex-column">
                <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                <input type="password" class="form-control" placeholder="Password">
            </div>
            <div class="mb-4 d-flex gap-3 flex-column">
                <label class="form-check-label fw-semibold text-secondary">gender</label>
                <div class="form-check">
                    <input type="radio" name="role" checked class="form-check-input">
                    <label class="form-check-label">Female</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="role" class="form-check-input">
                    <label class="form-check-label">male</label>
                </div>
            </div>
            <button class="border-1 bg-warning rounded-4 p-2 fw-bold" id="submitBtn">Submit</button>
        </form>
    </main>
    <script src="responsive.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
        <!-- SweetAlert2 -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
